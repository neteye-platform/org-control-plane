name: Terragrunt Plan

on:
  pull_request:
    branches:
      - "main"

jobs:
  validate-yaml:
    name: Validate Repo YAML Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - name: Validate all repo YAML files
        run: |
          set -e
          echo "Validating repo YAML files against schema..."
          # TODO: Validate all YAML files, not only products
          find products -type f -name "*.yaml" ! -name "_product_defaults.yaml" -print0 | while IFS= read -r -d '' file; do
            echo "Validating: $file"
            check-jsonschema --schemafile .github/schemas/repo.schema.json "$file"
          done
          echo "All repo YAML files are valid!"

  check-repo-names:
    name: Check for Repository Name Collisions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for duplicate repository names across products
        run: |
          set -e
          echo "Checking for duplicate repository names across products..."

          # Extract all repo names (filename without .yaml, or name field if specified)
          # For simplicity, using filenames as proxy (Task 4 module uses trimsuffix(basename(...), ".yaml"))
          find products -type f -name "*.yaml" ! -name "_product_defaults.yaml" -exec basename {} .yaml \; | sort | uniq -d > /tmp/duplicates.txt

          if [ -s /tmp/duplicates.txt ]; then
            echo "ERROR: Duplicate repository names found:"
            cat /tmp/duplicates.txt
            exit 1
          fi

          echo "No duplicate repository names found!"

  terraform-plan:
    name: Run Terragrunt Plan
    runs-on: ubuntu-latest
    needs: [validate-yaml, check-repo-names]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        unit:
          - org-settings
          - teams
          - products/example-product

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get Terraform Version
        id: tf_version
        run: |
          echo "value=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.tf_version.outputs.value }}

      - name: Check HCL formatting
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_command: "hcl fmt --check --diff"

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: generate-token
        with:
          app-id: ${{ vars.NETEYE_APP_ID }}
          private-key: ${{ secrets.NETEYE_APP_PRIVATE_KEY }}
          permission-pull-requests: write

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Plan
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          TF_VAR_github_org: ${{ github.repository_owner }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          GITHUB_APP_ID: ${{ vars.NETEYE_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ steps.generate-token.outputs.installation-id }}
          GITHUB_APP_PEM_FILE: ${{ secrets.NETEYE_APP_PRIVATE_KEY }}
        with:
          tg_dir: "${{ matrix.unit }}"
          tg_command: "plan"
          tg_comment: 1
